<?xml version="1.0" encoding="UTF-8"?>
<!-- Ripple Nexus — Primary Logo, stacked, for DARK backgrounds.
     Clear space: min 1x icon-height around entire lockup.
     Min usable size: 40px wide.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" role="img" aria-label="Ripple Nexus">
  <defs>
    <linearGradient id="rn-d" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%"  stop-color="#7C5CFF"/>
      <stop offset="55%" stop-color="#B794FF"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- Icon mark, centered horizontally -->
  <g transform="translate(128,8)">
    <circle cx="22" cy="32" r="5" fill="url(#rn-d)"/>
    <path d="M 27 23.34 A 10 10 0 0 1 27 40.66"  fill="none" stroke="url(#rn-d)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 34.73 19.27 A 18 18 0 0 1 34.73 44.73" fill="none" stroke="url(#rn-d)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M 44.52 19 A 26 26 0 0 1 44.52 45" fill="none" stroke="url(#rn-d)" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  </g>
  <!-- Wordmark -->
  <text x="160" y="108" text-anchor="middle"
        font-family="Satoshi Variable, Inter, ui-sans-serif, system-ui"
        font-weight="700" font-size="34" letter-spacing="-1.2"
        fill="#F4F5FA">Ripple Nexus</text>
  <!-- Tagline / eyebrow -->
  <text x="160" y="134" text-anchor="middle"
        font-family="Inter Variable, Inter, ui-sans-serif, system-ui"
        font-weight="600" font-size="10" letter-spacing="3"
        fill="#9BA2BE">AI SYSTEMS THAT RUN THE BUSINESS</text>
</svg>
