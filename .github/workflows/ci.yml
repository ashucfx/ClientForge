name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Generate Prisma Client
      run: npx prisma generate
      
    - name: Check TypeScript types
      run: npm run typecheck || npx tsc --noEmit
      
    - name: Run ESLint
      run: npm run lint || npx eslint .
      
    - name: Build Next.js
      run: npm run build
      env:
        # Provide dummy variables so Next.js build passes if it statically evaluates some of these
        DATABASE_URL: "postgresql://postgres:password@localhost:5432/ripple_nexus"
        NEXT_PUBLIC_APP_URL: "http://localhost:3000"
        RESEND_API_KEY: "re_dummy"
        CRON_SECRET: "dummy_cron_secret"
